<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Document</title>
</head>
<body>
    <div id="display">
        <h1 id="boardTitle">Tic-Tac-Toe</h1>
        <h3 id="namePrompt">Enter names for player one and two.</h3>
        <div id="buttonHeader">
            <button id="start">Start</button>
        </div>
        <div id="p1NameBox">
            <input id="p1NameEntry" type="text" value="Player 1" />
            <button id="p1NameSubmit">Submit</button>
            <p id="p1NameDisplay"></p>
            <p>Symbol: O</p>
        </div>
        <div id="p2NameBox">
            <input id="p2NameEntry" type="text" value="Player 2" />
            <button id="p2NameSubmit">Submit</button>
            <p id="p2NameDisplay"></p>
            <p>Symbol: X</p>
        </div>
        <div id="buttonWrapper"></div>
    </div>
</body>
</html>

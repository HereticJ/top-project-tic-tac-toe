<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Document</title>
</head>
<body>
    <div id="display">
        <h1 id="boardTitle">Tic-Tac-Toe</h1>
        <div id="buttonHeader">
            <button id="start">Start</button>
        </div>
        <div id="p1NameEntry">
            <input id="p1NameEntry" type="text" placeholder="Player 1 Name">
            <button id="p1NameSubmit">Submit</button>
        </div>
        <div id="p2NameEntry">
            <input id="p2NameEntry" type="text" placeholder="Player 2 Name">
            <button id="p2NameSubmit">Submit</button>
        </div>
        <div id="buttonWrapper"></div>
    </div>
</body>
</html>
